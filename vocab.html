<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafaf7;--card:#fff;--text:#2c2c2c;--muted:#999;
  --border:#e8e8e4;--accent:#4a7c59;--accent-light:#e8f0ea;
  --danger:#c0392b;--warn:#e67e22;--radius:8px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;
  -webkit-tap-highlight-color:transparent;padding-bottom:40px;
}
.container{max-width:500px;margin:0 auto;padding:10px 12px}

/* Header */
.header{
  position:sticky;top:0;z-index:10;background:var(--bg);
  padding:8px 0 6px;border-bottom:1px solid var(--border);
}
.header h1{font-size:16px;font-weight:620;margin-bottom:6px}
.search-wrap{position:relative;margin-bottom:6px}
.search-wrap input{
  width:100%;padding:8px 12px 8px 32px;font-size:14px;
  border:1px solid var(--border);border-radius:20px;background:var(--card);
  outline:none;-webkit-appearance:none;
}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:14px;pointer-events:none;
}

/* Tabs */
.tabs{
  display:flex;gap:6px;padding:6px 0;overflow-x:auto;
  scrollbar-width:none;-ms-overflow-style:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;padding:6px 14px;font-size:12px;font-weight:560;
  border-radius:16px;background:var(--card);border:1px solid var(--border);
  cursor:pointer;color:var(--muted);transition:all .15s;
}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Section title */
.sec-title{
  font-size:13px;font-weight:640;color:var(--accent);margin:14px 0 6px;
  padding-left:4px;letter-spacing:0.3px;
}

/* Category card */
.cat-card{
  background:var(--card);border-radius:var(--radius);margin-bottom:8px;
  border:1px solid var(--border);overflow:hidden;
}
.cat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;cursor:pointer;user-select:none;
  -webkit-user-select:none;font-size:13px;font-weight:560;
}
.cat-arrow{font-size:10px;color:var(--muted);transition:transform .2s}
.cat-card.open .cat-arrow{transform:rotate(90deg)}
.cat-body{display:none;padding:0 12px 10px}
.cat-card.open .cat-body{display:block}

/* Word row */
.word-row{
  display:flex;align-items:baseline;padding:6px 0;
  border-bottom:1px solid #f5f5f2;font-size:13px;gap:8px;
}
.word-row:last-child{border-bottom:none}
.word-en{font-weight:540;min-width:80px;color:#2c2c2c}
.word-cn{color:var(--muted);min-width:50px;font-size:12px}
.word-trap{font-size:11px;color:var(--danger);flex:1;line-height:1.3}

/* Highlight */
.hl{background:#fff3cd;padding:1px 4px;border-radius:3px;font-weight:600}
.err{color:var(--danger);text-decoration:line-through;margin-right:4px;font-size:11px}
.ok{color:var(--accent);font-weight:600}

/* Speed check list */
.speed-item{
  display:flex;align-items:center;padding:7px 8px;gap:10px;
  border-bottom:1px solid #f5f5f2;font-size:13px;
}
.speed-num{font-size:11px;color:var(--muted);min-width:18px}
.speed-cn{flex:1}
.speed-en{color:var(--muted);font-size:12px}

/* No results */
.no-result{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}

/* Footer */
.footer{text-align:center;padding:20px;font-size:11px;color:#ccc}

/* Uppercase label */
.tag{
  display:inline-block;font-size:9px;font-weight:640;padding:1px 6px;
  border-radius:3px;margin-right:4px;text-transform:uppercase;letter-spacing:0.3px;
}
.tag-trap{background:#fde8e8;color:var(--danger)}
.tag-silent{background:#e8f0ff;color:#2563eb}
.tag-double{background:#fef3c7;color:#b45309}
.tag-ei{background:#f0fdf4;color:#15803d}

// ═══════════════ RENDER ═══════════════
let currentTab = 0;

function render(tabIdx, filter) {
  const section = SECTIONS[tabIdx];
  const container = document.getElementById('content');
  const q = (filter || '').toLowerCase().trim();

  let html = '';

  section.cats.forEach((cat, ci) => {
    let filtered = cat.words;
    if (q) {
      filtered = cat.words.filter(w =>
        w[0].toLowerCase().includes(q) ||
        w[1].includes(q) ||
        (w[2] && w[2].includes(q))
      );
    }
    if (filtered.length === 0) return;

    html += `<div class="cat-card${q ? ' open' : (ci === 0 ? ' open' : '')}">`;
    html += `<div class="cat-header" onclick="toggleCat(this.parentElement)">`;
    html += `<span>${cat.title} <span style="font-size:11px;color:var(--muted)">(${filtered.length})</span></span>`;
    html += `<span class="cat-arrow">▶</span>`;
    html += `</div><div class="cat-body">`;

    filtered.forEach(w => {
      const traps = [];
      if (w[3] === 1) traps.push('<span class="tag tag-double">双写</span>');
      if (w[2] && w[2].includes('不发音')) traps.push('<span class="tag tag-silent">不发音</span>');
      if (w[2] && (w[2].includes('ei') || w[2].includes('ie'))) traps.push('<span class="tag tag-ei">ie/ei</span>');
      if (w[2] && w[2].includes('不是')) traps.push('<span class="tag tag-trap">易错</span>');

      html += `<div class="word-row">`;
      html += `<span class="word-en">${highlight(w[0], q)}</span>`;
      html += `<span class="word-cn">${w[1]}</span>`;
      if (w[2]) {
        html += `<span class="word-trap">${traps.join('')}${highlight(w[2], q)}</span>`;
      }
      html += `</div>`;
    });

    html += `</div></div>`;
  });

  if (!html.trim()) {
    html = `<div class="no-result">没有找到匹配的词汇<br><small>试试英文或中文关键词</small></div>`;
  }

  container.innerHTML = html;
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<span class="hl">$1</span>');
}

function toggleCat(card) {
  card.classList.toggle('open');
}

function switchTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.getElementById('search').value = '';
  render(idx, '');
}

function doSearch() {
  const q = document.getElementById('search').value;
  if (q.trim()) {
    // Search across all sections
    const container = document.getElementById('content');
    let html = '';
    let foundAny = false;

    SECTIONS.forEach((section, si) => {
      let secHTML = '';
      section.cats.forEach(cat => {
        const filtered = cat.words.filter(w =>
          w[0].toLowerCase().includes(q.toLowerCase()) ||
          w[1].includes(q) ||
          (w[2] && w[2].includes(q))
        );
        if (filtered.length === 0) return;
        foundAny = true;

        secHTML += `<div class="cat-card open">`;
        secHTML += `<div class="cat-header" onclick="toggleCat(this.parentElement)">`;
        secHTML += `<span>${cat.title} <span style="font-size:11px;color:var(--muted)">(${filtered.length})</span></span>`;
        secHTML += `<span class="cat-arrow">▶</span>`;
        secHTML += `</div><div class="cat-body">`;

        filtered.forEach(w => {
          const traps = [];
          if (w[3] === 1) traps.push('<span class="tag tag-double">双写</span>');
          if (w[2] && w[2].includes('不发音')) traps.push('<span class="tag tag-silent">不发音</span>');
          if (w[2] && (w[2].includes('ei') || w[2].includes('ie'))) traps.push('<span class="tag tag-ei">ie/ei</span>');
          if (w[2] && w[2].includes('不是')) traps.push('<span class="tag tag-trap">易错</span>');

          secHTML += `<div class="word-row">`;
          secHTML += `<span class="word-en">${highlight(w[0], q)}</span>`;
          secHTML += `<span class="word-cn">${w[1]}</span>`;
          if (w[2]) {
            secHTML += `<span class="word-trap">${traps.join('')}${highlight(w[2], q)}</span>`;
          }
          secHTML += `</div>`;
        });

        secHTML += `</div></div>`;
      });

      if (secHTML) {
        html += `<div class="sec-title">${section.name}</div>${secHTML}`;
      }
    });

    if (!foundAny) {
      html = `<div class="no-result">没有找到包含「${q}」的词汇<br><small>试试不同的关键词</small></div>`;
    }
    container.innerHTML = html;
  } else {
    render(currentTab, '');
  }
}
