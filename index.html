<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>雅思备考 · 14天冲刺</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f8f5;
    --card: #fff;
    --text: #2c2c2c;
    --muted: #999;
    --border: #e8e8e4;
    --accent: #4a7c59;
    --accent-light: #e8f0ea;
    --danger: #c44;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.05);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-tap-highlight-color: transparent;
    padding-bottom: 40px;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 12px 14px;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding: 10px 0 8px;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .header h1 {
    font-size: 17px;
    font-weight: 620;
    letter-spacing: -0.2px;
  }

  .header .badge {
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-light);
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 560;
  }

  .progress-wrap { margin-top: 4px; }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .progress-bar {
    height: 5px;
    background: #e8e8e4;
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 10px;
    transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ── Day Card ── */
  .day-card {
    background: var(--card);
    border-radius: var(--radius);
    margin-top: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .day-header {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    gap: 10px;
  }

  .day-num {
    font-size: 13px;
    font-weight: 640;
    color: var(--accent);
    min-width: 42px;
  }

  .day-info { flex: 1; min-width: 0; }

  .day-title {
    font-size: 14px;
    font-weight: 560;
  }

  .day-date {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  .day-arrow {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
  }

  .day-card.open .day-arrow { transform: rotate(90deg); }

  .day-progress-mini {
    font-size: 11px;
    color: var(--muted);
    min-width: 32px;
    text-align: right;
  }

  .day-body { display: none; padding: 0 14px 14px; }

  .day-card.open .day-body { display: block; }

  /* ── Task blocks ── */
  .task-block {
    margin-top: 10px;
  }

  .task-block-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 5px;
    padding-left: 2px;
  }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 9px;
    padding: 7px 8px;
    border-radius: 6px;
    transition: background 0.15s;
    cursor: pointer;
  }

  .task-item:active { background: #f5f5f2; }

  .task-item.done .task-text {
    text-decoration: line-through;
    color: #bbb;
  }

  .checkbox {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border: 2px solid #d0d0cc;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-top: 1px;
  }

  .task-item.done .checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }

  .checkbox::after {
    content: '';
    display: none;
    width: 5px;
    height: 9px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .task-item.done .checkbox::after { display: block; }

  .task-text {
    flex: 1;
    font-size: 13.5px;
    line-height: 1.45;
    color: #3a3a3a;
  }

  .task-text small {
    display: block;
    font-size: 11px;
    color: #aaa;
    margin-top: 1px;
    font-weight: 400;
  }

  /* ── Reset button ── */
  .reset-btn {
    display: block;
    margin: 24px auto;
    padding: 8px 24px;
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: 1px solid #ddd;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover { color: var(--danger); border-color: var(--danger); }

  .footer {
    text-align: center;
    font-size: 11px;
    color: #ccc;
    padding: 10px 0;
  }
</style>
</head>

// ═══════════════ STATE ═══════════════
const STORAGE_KEY = 'ielts_todolist_checked';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? new Set(JSON.parse(raw)) : new Set();
  } catch { return new Set(); }
}

function saveState(checked) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...checked]));
}

const checked = loadState();

// ═══════════════ RENDER ═══════════════
const openDays = new Set([0]); // Day 1 open by default

function makeTaskId(dayIdx, blockIdx, itemIdx) {
  return `d${dayIdx}-b${blockIdx}-i${itemIdx}`;
}

function render() {
  const container = document.getElementById('days');
  let totalDone = 0;
  let totalCount = 0;

  container.innerHTML = DAYS.map((day, di) => {
    let dayDone = 0;
    let dayCount = 0;

    const blocksHTML = day.tasks.map((block, bi) => {
      const itemsHTML = block.items.map((item, ii) => {
        const id = makeTaskId(di, bi, ii);
        const isDone = checked.has(id);
        dayCount++;
        if (isDone) dayDone++;
        return `
          <div class="task-item${isDone ? ' done' : ''}" data-id="${id}" onclick="toggle('${id}')">
            <div class="checkbox"></div>
            <span class="task-text">${item}</span>
          </div>`;
      }).join('');

      return `
        <div class="task-block">
          <div class="task-block-label">${block.block}</div>
          ${itemsHTML}
        </div>`;
    }).join('');

    const dayPct = dayCount ? Math.round((dayDone / dayCount) * 100) : 0;
    totalDone += dayDone;
    totalCount += dayCount;

    return `
      <div class="day-card${openDays.has(di) ? ' open' : ''}" data-day="${di}">
        <div class="day-header" onclick="toggleDay(this.parentElement)">
          <span class="day-num">Day ${di + 1}</span>
          <div class="day-info">
            <div class="day-title">${day.title}</div>
            <div class="day-date">${day.date}</div>
          </div>
          <span class="day-progress-mini">${dayPct}%</span>
          <span class="day-arrow">▶</span>
        </div>
        <div class="day-body">
          <div class="progress-wrap" style="margin-bottom:8px">
            <div class="progress-bar" style="height:3px">
              <div class="progress-fill" style="width:${dayPct}%"></div>
            </div>
          </div>
          ${blocksHTML}
        </div>
      </div>`;
  }).join('');

  // Update total progress
  const totalPct = totalCount ? Math.round((totalDone / totalCount) * 100) : 0;
  document.getElementById('totalPercent').textContent = totalPct + '%';
  document.getElementById('totalBar').style.width = totalPct + '%';

  // Update days left badge
  const now = new Date();
  const examDate = new Date(2026, 4, 29); // May 29, 2026
  const diffDays = Math.ceil((examDate - now) / (1000 * 60 * 60 * 24));
  const badge = document.getElementById('daysLeft');
  if (diffDays > 0) {
    badge.textContent = `距考试 ${diffDays} 天`;
  } else if (diffDays === 0) {
    badge.textContent = '今天考试！';
  } else {
    badge.textContent = '考试已结束';
  }
}

// ═══════════════ ACTIONS ═══════════════
function toggle(id) {
  if (checked.has(id)) {
    checked.delete(id);
  } else {
    checked.add(id);
  }
  saveState(checked);
  render();
}

function toggleDay(card) {
  const di = parseInt(card.dataset.day);
  if (openDays.has(di)) {
    openDays.delete(di);
    card.classList.remove('open');
  } else {
    openDays.add(di);
    card.classList.add('open');
  }
}

function resetAll() {
  if (confirm('确定要重置全部进度吗？此操作不可撤销。')) {
    checked.clear();
    saveState(checked);
    render();
  }
}

// ═══════════════ INIT ═══════════════
render();
</script>
